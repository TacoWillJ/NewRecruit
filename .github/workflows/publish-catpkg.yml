name: Publish catpkg
on:
  release:
    types: [ published, edited ]
permissions: write-all
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Generate catpkg.json and BSI
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          const repo = context.repo;
          const tag = context.payload.release.tag_name;
          const releaseName = context.payload.release.name || tag;
          const baseUrl = `https://raw.githubusercontent.com/${repo.owner}/${repo.repo}/main`;
          const bsiUrl = `https://github.com/${repo.owner}/${repo.repo}/releases/latest/download/NewRecruit.latest.bsi`;
          const catpkgUrl = `https://github.com/${repo.owner}/${repo.repo}/releases/latest/download/NewRecruit.catpkg.json`;

          // Find all .cat and .gst files
          const files = fs.readdirSync('.').filter(f => f.endsWith('.cat') || f.endsWith('.gst'));
          console.log(`Found ${files.length} catalogue files`);

          const repoFiles = [];
          const indexEntries = [];

          for (const fname of files) {
            const content = fs.readFileSync(fname, 'utf8');
            const idMatch = content.match(/(?:catalogue|gameSystem)[^>]*\sid="([^"]+)"/);
            const nameMatch = content.match(/(?:catalogue|gameSystem)[^>]*\sname="([^"]+)"/);
            const revMatch = content.match(/(?:catalogue|gameSystem)[^>]*\srevision="([^"]+)"/);
            const bsMatch = content.match(/(?:catalogue|gameSystem)[^>]*\sbattleScribeVersion="([^"]+)"/);

            const id = idMatch ? idMatch[1] : fname;
            const name = nameMatch ? nameMatch[1] : fname;
            const rev = revMatch ? parseInt(revMatch[1]) : 1;
            const bsver = bsMatch ? bsMatch[1] : '2.03';
            const type = fname.endsWith('.gst') ? 'gameSystem' : 'catalogue';
            const fileUrl = `${baseUrl}/${encodeURIComponent(fname)}`;

            repoFiles.push({ id, name, type, revision: rev, battleScribeVersion: bsver, fileUrl });
            indexEntries.push(`    <dataIndexEntry filePath="${fname}" dataType="${type}" dataId="${id}" dataName="${name}" dataBattleScribeVersion="${bsver}" dataRevision="${rev}"/>`);
          }

          // Write catpkg.json
          const catpkg = {
            '$schema': 'https://raw.githubusercontent.com/BSData/schemas/master/src/catpkg.schema.json',
            name: 'No Figure Left Behind [NFLB]',
            description: 'WH40K 10th Edition with NFLB homebrew units and detachments',
            battleScribeVersion: '2.03',
            version: tag,
            lastUpdated: new Date().toISOString(),
            lastUpdateDescription: releaseName,
            indexUrl: bsiUrl,
            repositoryUrl: catpkgUrl,
            githubUrl: `https://github.com/${repo.owner}/${repo.repo}`,
            feedUrl: `https://github.com/${repo.owner}/${repo.repo}/releases.atom`,
            bugTrackerUrl: `https://github.com/${repo.owner}/${repo.repo}/issues`,
            repositoryFiles: repoFiles
          };
          fs.writeFileSync('NewRecruit.catpkg.json', JSON.stringify(catpkg, null, 2));
          console.log('Generated NewRecruit.catpkg.json');

          // Write BSI XML then zip it
          const bsiXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
          <dataIndex battleScribeVersion="2.03" name="No Figure Left Behind [NFLB]" indexUrl="${bsiUrl}" xmlns="http://www.battlescribe.net/schema/dataIndexSchema">
            <dataIndexEntries>
          ${indexEntries.join('\n')}
            </dataIndexEntries>
          </dataIndex>`;
          fs.writeFileSync('NewRecruit.index.xml', bsiXml);
          execSync('zip NewRecruit.latest.bsi NewRecruit.index.xml');
          console.log('Generated NewRecruit.latest.bsi');

    - name: Upload assets to release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload "${{ github.event.release.tag_name }}" \
          NewRecruit.latest.bsi \
          NewRecruit.catpkg.json \
          --clobber
